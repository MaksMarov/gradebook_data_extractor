[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "data_extractor"
version = "0.1.0"
description = "Image processing pipeline for student document photos: face crop, anchor crop, VLM OCR, student number parsing."
readme = {text = "Image processing pipeline for student document photos.", content-type = "text/plain"}
requires-python = ">=3.11"
dependencies = [
    "numpy>=1.24",
    "opencv-python>=4.8",
    "requests>=2.31",
    "ultralytics>=8.0",
    "easyocr>=1.7",
]

[project.optional-dependencies]
test = ["pytest>=8.0"]

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
data_extractor = ["py.typed"]
