services:
  ollama:
    image: ollama/ollama:${OLLAMA_IMAGE_TAG:-latest}
    container_name: gradebook-ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    expose:
      - "11434"
    networks:
      - gradebook_network
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 20s

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: gradebook-backend
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      WEB_PROCESSOR_MODE: ${WEB_PROCESSOR_MODE:-pipeline}
      WEB_PIPELINE_DEBUG: ${WEB_PIPELINE_DEBUG:-1}
      WEB_PIPELINE_CONCURRENCY: ${WEB_PIPELINE_CONCURRENCY:-1}
      WEB_JOBS_DIR: ${WEB_JOBS_DIR:-data/web_jobs}
      WEB_MAX_UPLOAD_FILES: ${WEB_MAX_UPLOAD_FILES:-50}
      WEB_MAX_UPLOAD_SIZE_MB: ${WEB_MAX_UPLOAD_SIZE_MB:-25}
      WEB_ALLOWED_IMAGE_EXTENSIONS: ${WEB_ALLOWED_IMAGE_EXTENSIONS:-jpg,jpeg,png,webp,bmp}
      YOLO_MODEL_PATH: ${YOLO_MODEL_PATH:-models/yolo26n.pt}
      OCR_MODE: ${OCR_MODE:-qwen}
      MODEL_NAME: ${MODEL_NAME:-qwen2.5vl:3b}
      MODEL_BASE_URL: ${MODEL_BASE_URL:-http://ollama:11434}
    volumes:
      - ./data:/app/data
      - ./models:/app/models:ro
    networks:
      - gradebook_network
    expose:
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/api/health/ready >/dev/null || exit 1"]
      interval: 15s
      timeout: 8s
      retries: 20
      start_period: 30s

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    container_name: gradebook-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - gradebook_network
    ports:
      - "${FRONTEND_PORT:-18765}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost/api/health/live || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  ollama_data:
    name: ${OLLAMA_VOLUME:-gradebook_ollama_data}

networks:
  gradebook_network:
    name: ${GRADEBOOK_NETWORK:-gradebook_network}
    driver: bridge
